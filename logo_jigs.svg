<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001F6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6A800;stop-opacity:1" />
    </linearGradient>
    <path id="topArc" d="M 14,100 A 86,86 0 0,1 186,100" fill="none"/>
    <path id="bottomArc" d="M 16,112 A 86,86 0 0,0 184,112" fill="none"/>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="98" fill="#000D40"/>
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>

  <!-- Decorative gear teeth -->
  <g fill="#FFD700" opacity="0.18">
    <rect x="97" y="2" width="6" height="14" rx="2"/>
    <rect x="97" y="184" width="6" height="14" rx="2"/>
    <rect x="2" y="97" width="14" height="6" rx="2"/>
    <rect x="184" y="97" width="14" height="6" rx="2"/>
    <rect x="148" y="10" width="6" height="14" rx="2" transform="rotate(45 151 17)"/>
    <rect x="42" y="10" width="6" height="14" rx="2" transform="rotate(-45 45 17)"/>
    <rect x="148" y="176" width="6" height="14" rx="2" transform="rotate(-45 151 183)"/>
    <rect x="42" y="176" width="6" height="14" rx="2" transform="rotate(45 45 183)"/>
    <rect x="176" y="42" width="6" height="14" rx="2" transform="rotate(45 179 49)"/>
    <rect x="176" y="144" width="6" height="14" rx="2" transform="rotate(-45 179 151)"/>
    <rect x="10" y="42" width="6" height="14" rx="2" transform="rotate(-45 13 49)"/>
    <rect x="10" y="144" width="6" height="14" rx="2" transform="rotate(45 13 151)"/>
  </g>

  <!-- Border rings -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.7"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.4"/>

  <!-- Background gear (decorative) -->
  <g opacity="0.10" fill="#FFD700">
    <path d="M100,38 L106,38 L108,50 C113,51 118,53 122,56 L133,48 L138,53 L130,64 C133,68 136,73 137,78 L150,80 L150,86 L137,88 C136,93 133,98 130,102 L138,113 L133,118 L122,110 C118,113 113,115 108,116 L106,128 L100,128 L94,128 L92,116 C87,115 82,113 78,110 L67,118 L62,113 L70,102 C67,98 64,93 63,88 L50,86 L50,80 L63,78 C64,73 67,68 70,64 L62,53 L67,48 L78,56 C82,53 87,51 92,50 Z"/>
    <circle cx="100" cy="83" r="18"/>
  </g>

  <!-- WRENCH bottom-right -->
  <g transform="translate(172, 168) rotate(-40)" opacity="0.75">
    <path d="M14,2 C9,2 5,6 5,11 C5,13 6,15 7,16.5 L2,22 C1,23 1,25 2,26 C3,27 5,27 6,26 L12,20.5 C13.5,21.5 15.5,22 17.5,22 C22.5,22 26.5,18 26.5,13 C26.5,11.5 26,10 25,8.5 L19,14.5 L15.5,11 L21,5 C19.5,3 17,2 14,2 Z"
          fill="#FFD700" stroke="#FFD700" stroke-width="0.5" transform="scale(0.85)"/>
  </g>

  <!-- CIRCULAR TEXT top -->
  <text font-family="'Arial', sans-serif" font-size="6.8" font-weight="700" fill="#FFD700" letter-spacing="1.5" opacity="0.95">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">TÉCNICAS Y HERRAMIENTAS MODERNAS</textPath>
  </text>

  <!-- CIRCULAR TEXT bottom -->
  <text font-family="'Arial', sans-serif" font-size="7" font-weight="700" fill="#FFD700" letter-spacing="2.5" opacity="0.95">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">· ING. INDUSTRIAL ·</textPath>
  </text>

  <!-- Boca Juniors founding date instead of GRUPO -->
  <text x="100" y="31"
        font-family="'Arial', sans-serif"
        font-size="6.5" font-weight="700"
        text-anchor="middle"
        fill="#FFD700" letter-spacing="2" opacity="0.85">★ 3 DE ABRIL DE 1905 ★</text>

  <!-- Main JIGS text -->
  <text x="100" y="116"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="64" font-weight="900"
        text-anchor="middle"
        fill="url(#goldGrad)"
        letter-spacing="3"
        stroke="#000D40" stroke-width="3"
        style="paint-order: stroke;">JIGS</text>

  <!-- Separator -->
  <line x1="26" y1="128" x2="174" y2="128" stroke="#FFD700" stroke-width="0.7" opacity="0.4"/>

  <!-- ===== MEMBER AVATARS ===== -->

  <!-- JAEL – raqueta de tenis -->
  <g transform="translate(34, 146)">
    <circle cx="0" cy="0" r="10" fill="#003399" stroke="#FFD700" stroke-width="1.2"/>
    <ellipse cx="-0.5" cy="-2.5" rx="5" ry="6" fill="none" stroke="#FFD700" stroke-width="1.4"/>
    <line x1="-5" y1="-4.5" x2="4" y2="-4.5" stroke="#FFD700" stroke-width="0.5" opacity="0.8"/>
    <line x1="-5.3" y1="-2.5" x2="4.3" y2="-2.5" stroke="#FFD700" stroke-width="0.5" opacity="0.8"/>
    <line x1="-5" y1="-0.5" x2="4" y2="-0.5" stroke="#FFD700" stroke-width="0.5" opacity="0.8"/>
    <line x1="-4" y1="1.5" x2="3" y2="1.5" stroke="#FFD700" stroke-width="0.5" opacity="0.8"/>
    <line x1="-3" y1="-8.4" x2="-3" y2="3.5" stroke="#FFD700" stroke-width="0.5" opacity="0.8"/>
    <line x1="-1" y1="-8.4" x2="-1" y2="3.8" stroke="#FFD700" stroke-width="0.5" opacity="0.8"/>
    <line x1="1" y1="-8.4" x2="1" y2="3.8" stroke="#FFD700" stroke-width="0.5" opacity="0.8"/>
    <line x1="3" y1="-8" x2="3" y2="3" stroke="#FFD700" stroke-width="0.5" opacity="0.8"/>
    <rect x="-1.5" y="3.5" width="3" height="5.5" rx="1" fill="#FFD700"/>
    <circle cx="6" cy="-7" r="2.5" fill="#CCFF00"/>
    <path d="M4,-8.5 Q6,-6.5 4,-5" fill="none" stroke="white" stroke-width="0.6"/>
    <path d="M8,-8.5 Q6,-6.5 8,-5" fill="none" stroke="white" stroke-width="0.6"/>
  </g>
  <text x="34" y="160" font-family="'Arial', sans-serif" font-size="6.5" font-weight="700" text-anchor="middle" fill="#FFD700">Jael</text>

  <!-- IGNA – guitarra eléctrica -->
  <g transform="translate(72, 146)">
    <circle cx="0" cy="0" r="10" fill="#003399" stroke="#FFD700" stroke-width="1.2"/>
    <ellipse cx="1" cy="3.5" rx="4.5" ry="3.5" fill="#FFD700"/>
    <ellipse cx="0.5" cy="-0.5" rx="3" ry="2.5" fill="#FFD700"/>
    <rect x="-0.5" y="0.5" width="3" height="2" fill="#003399"/>
    <rect x="-0.8" y="-8" width="2" height="7" rx="0.5" fill="#E6A800"/>
    <rect x="-1.5" y="-9.5" width="3.5" height="2" rx="0.8" fill="#E6A800"/>
    <circle cx="-2" cy="-8.8" r="0.7" fill="#FFD700"/>
    <circle cx="2.5" cy="-8.8" r="0.7" fill="#FFD700"/>
    <line x1="0" y1="-8" x2="1" y2="4" stroke="white" stroke-width="0.35" opacity="0.9"/>
    <line x1="-0.5" y1="-8" x2="0.3" y2="4" stroke="white" stroke-width="0.35" opacity="0.9"/>
    <line x1="0.5" y1="-8" x2="1.7" y2="4" stroke="white" stroke-width="0.35" opacity="0.9"/>
    <rect x="-1" y="1.5" width="4" height="1.2" rx="0.4" fill="#333"/>
    <rect x="-0.5" y="3.5" width="3.5" height="1.2" rx="0.4" fill="#333"/>
    <circle cx="1.5" cy="5" r="1" fill="#CC8800"/>
  </g>
  <text x="72" y="160" font-family="'Arial', sans-serif" font-size="6.5" font-weight="700" text-anchor="middle" fill="#FFD700">Igna</text>

  <!-- GONZA – estrella amarilla -->
  <g transform="translate(122, 146)">
    <circle cx="0" cy="0" r="10" fill="#003399" stroke="#FFD700" stroke-width="1.2"/>
    <polygon points="0,-7 1.8,-2.5 6.7,-2.5 2.7,0.8 4.1,5.9 0,3 -4.1,5.9 -2.7,0.8 -6.7,-2.5 -1.8,-2.5"
             fill="#FFD700" stroke="#E6A800" stroke-width="0.5"/>
  </g>
  <text x="122" y="160" font-family="'Arial', sans-serif" font-size="6.5" font-weight="700" text-anchor="middle" fill="#FFD700">Gonza</text>

  <!-- SEBA – estrella amarilla -->
  <g transform="translate(162, 146)">
    <circle cx="0" cy="0" r="10" fill="#003399" stroke="#FFD700" stroke-width="1.2"/>
    <polygon points="0,-7 1.8,-2.5 6.7,-2.5 2.7,0.8 4.1,5.9 0,3 -4.1,5.9 -2.7,0.8 -6.7,-2.5 -1.8,-2.5"
             fill="#FFD700" stroke="#E6A800" stroke-width="0.5"/>
  </g>
  <text x="162" y="160" font-family="'Arial', sans-serif" font-size="6.5" font-weight="700" text-anchor="middle" fill="#FFD700">Seba</text>

</svg>
